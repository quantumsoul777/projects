name: DNA Callback

# Propagated by zero-friction. Do not edit manually.
# Manual trigger only — automatic push callbacks are disabled to avoid Actions cost.

on:
  workflow_dispatch:

jobs:
  callback:
    runs-on: ubuntu-latest
    steps:
      - name: Send push event to zero-friction
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ZERO_FRICTION_DISPATCH_TOKEN || github.token }}
          script: |
            if (context.repo.repo === 'zero-friction') {
              console.log('zero-friction self-callback skipped')
              return
            }
            if (!('${{ secrets.ZERO_FRICTION_DISPATCH_TOKEN }}')) {
              console.log('ZERO_FRICTION_DISPATCH_TOKEN not set - skipping callback')
              return
            }
            try {
              await github.rest.repos.createDispatchEvent({
                owner: 'quantumsoul777',
                repo: 'zero-friction',
                event_type: 'repo-push',
                client_payload: {
                  repo: context.repo.repo,
                  sha: context.sha,
                  ref: context.ref,
                  actor: context.actor,
                  timestamp: new Date().toISOString()
                }
              })
              console.log(`Callback sent for ${context.repo.repo}`)
            } catch (e) {
              console.log(`Callback failed: ${e.message}`)
            }
